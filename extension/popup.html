<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    .header span {
      font-size: 15px;
      font-weight: 600;
    }
    .video-title {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 14px;
      line-height: 1.4;
      word-break: break-word;
      max-height: 40px;
      overflow: hidden;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      margin-bottom: 14px;
    }
    select option {
      background: #1a1a1a;
      color: #fff;
    }
    select:focus {
      border-color: #ff4444;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #cc0000;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .status.info {
      display: block;
      background: rgba(255,255,255,0.06);
      color: #aaa;
    }
    .status.success {
      display: block;
      background: rgba(0,200,83,0.15);
      color: #00c853;
    }
    .status.error {
      display: block;
      background: rgba(255,68,68,0.15);
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="YouDown">
    <span>YouDown</span>
  </div>

  <div class="video-title" id="videoTitle">Загрузка...</div>

  <label for="quality">Качество</label>
  <select id="quality"></select>

  <label for="outputDir">Папка для скачивания</label>
  <div style="display:flex; gap:6px; margin-bottom:14px;">
    <input type="text" id="outputDir" style="flex:1; padding:8px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#fff; font-size:12px; outline:none; font-family:inherit;">
  </div>

  <button class="btn" id="downloadBtn">⬇ Скачать</button>

  <div class="status" id="status" role="status" aria-live="polite"></div>

  <script src="url-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
